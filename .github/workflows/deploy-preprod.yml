name: Deploy to Google Play (Internal testing)

# Build a release AAB and ship it to the Play "Internal testing" track.
# Trigger manually from the Actions tab, or automatically on push to master.
on:
  workflow_dispatch:
  push:
    branches: [master]

concurrency:
  group: deploy-preprod
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Generated sources (*.g.dart, *.freezed.dart) are gitignored, so they must
      # be regenerated on a fresh checkout before the build can compile.
      - name: Generate code (freezed / riverpod / json_serializable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      # env/prod.json is gitignored, so it's absent on a fresh checkout. The
      # prod build reads FLAVOR / API_BASE_URL / etc. from it via
      # --dart-define-from-file; without it the app falls back to dev defaults.
      - name: Create env/prod.json
        env:
          PROD_ENV_JSON: ${{ secrets.PROD_ENV_JSON }}
        run: printf '%s' "$PROD_ENV_JSON" > env/prod.json

      # versionCode = GitHub run number, so it always increases without manual bumping.
      # versionName still comes from pubspec.yaml.
      # --flavor prod is required now that dev/prod product flavors exist; it also
      # selects the prodRelease output path used by the upload step below.
      - name: Build App Bundle
        run: flutter build appbundle --release --flavor prod --dart-define-from-file=env/prod.json --build-number=${{ github.run_number }}

      - name: Upload to Play Internal testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.massdrive.customer_app
          releaseFiles: build/app/outputs/bundle/prodRelease/app-prod-release.aab
          track: internal
          status: completed
